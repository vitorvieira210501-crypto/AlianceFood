<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Indisponível | AlianceFood</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #F8FAFC; height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; }
        .block-card { background: white; padding: 50px 40px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); text-align: center; max-width: 450px; border-top: 5px solid #EF4444; }
        .icon-box { width: 80px; height: 80px; background: rgba(239, 68, 68, 0.1); color: #EF4444; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; margin: 0 auto 20px; }
        .btn-panel { background: #0F172A; color: white; padding: 12px 30px; border-radius: 50px; font-weight: 700; text-decoration: none; display: inline-block; margin-top: 25px; transition: 0.3s; }
        .btn-panel:hover { background: #1E293B; transform: translateY(-2px); color: white;}
    </style>
</head>
<body>

    <div class="block-card">
        <div class="icon-box"><i class="fas fa-store-slash"></i></div>
        <h3 class="fw-bold text-dark mb-2">Loja Indisponível</h3>
        <p class="text-muted mb-4">O cardápio digital do estabelecimento <strong>{{ restaurante.nome }}</strong> encontra-se temporariamente suspenso.</p>
        
        <div class="p-3 rounded-3" style="background: #F1F5F9; border: 1px dashed #CBD5E1; font-size: 0.85rem; color: #64748B;">
            <i class="fas fa-info-circle me-1"></i> Se você é o proprietário desta loja, regularize a sua assinatura no painel para retomar as vendas imediatamente.
        </div>

        <a href="{% url 'login' %}" class="btn-panel">Acessar Meu Painel <i class="fas fa-arrow-right ms-2"></i></a>
    </div>

</body>
</html>
